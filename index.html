<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acarajé Moda Praia</title>

<!-- Fonte mais bonita estilo praia -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Poppins:wght@600&display=swap" rel="stylesheet">

<style>
  body { 
    font-family: 'Montserrat', sans-serif; 
    background: #FFF8E1; 
    margin: 0; 
    padding: 0; 
  }
  header { 
    background: url('https://i.imgur.com/7QKzW1L.jpg') center/cover no-repeat; /* imagem de praia */
    color: white; 
    padding: 60px 20px; 
    text-align: center; 
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
  }
  header h1 { font-family: 'Poppins', sans-serif; font-size: 2.5em; margin: 0; }
  .container { padding: 20px; }
  .produto { 
    background: white; 
    padding: 15px; 
    margin: 10px 0; 
    border-radius: 12px; 
    box-shadow: 0 3px 8px rgba(0,0,0,0.1); 
  }
  button { 
    background: linear-gradient(to right, #FFA000, #FF6F00); 
    color: white; 
    border: none; 
    padding: 12px 24px; 
    border-radius: 25px; 
    cursor: pointer; 
    font-weight: 700;
  }
  button:disabled { background: #BDBD; cursor: not-allowed; }
  select, input { padding: 10px; margin: 5px; border-radius: 8px; border: 1px solid #0288D1; }
</style>
</head>
<body>

<header>
  <h1>Acarajé Moda Praia 🌊</h1>
  <p>O melhor acarajé da cidade!</p>
</header>

<div class="container">
  <div class="produto">
    <h3>Acarajé Tradicional - R$ 15,00</h3>
    <button onclick="adicionarItem('Acarajé Tradicional', 15)">Adicionar</button>
  </div>

  <h2>Seu Pedido</h2>
  <ul id="carrinho"></ul>
  <p><b>Total: R$ <span id="total">0.00</span></b></p>

  <h3>Entrega</h3>
  <select id="bairro" onchange="calcularTotal()">
    <option value="0">Retirar no local</option>
    <option value="8">Centro - R$ 8,00</option>
    <option value="10">Estádio - R$ 10,00</option>
    <option value="9">Pioneiro - R$ 9,00</option>
    <option value="10">Santa Rita - R$ 10,00</option>
  </select>

  <button id="btnFinalizar" onclick="finalizarPedido()">Finalizar Pedido</button>
</div>

<!-- Som do carrinho -->
<audio id="somCarrinho" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
let carrinho = [];
let pedidoFinalizado = false;

function adicionarItem(nome, preco) {
  if(pedidoFinalizado) return alert("Pedido já finalizado!");
  carrinho.push({nome, preco});
  document.getElementById("somCarrinho").play(); // toca o som
  atualizarCarrinho();
}

function atualizarCarrinho() {
  let lista = document.getElementById("carrinho");
  lista.innerHTML = "";
  carrinho.forEach(item => {
    let li = document.createElement("li");
    li.textContent = `${item.nome} - R$ ${item.preco.toFixed(2)}`;
    lista.appendChild(li);
  });
  calcularTotal();
}

function calcularTotal() {
  let subtotal = carrinho.reduce((acc, item) => acc + item.preco, 0);
  let taxa = parseFloat(document.getElementById("bairro").value);
  document.getElementById("total").textContent = (subtotal + taxa).toFixed(2);
}

function finalizarPedido() {
  pedidoFinalizado = true;
  document.getElementById("btnFinalizar").disabled = true;
  alert("Pedido finalizado! Obrigado pela preferência ❤️");
}
</script>

</body>
</html>
